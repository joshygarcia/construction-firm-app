name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches package.json version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}".TrimStart("v")
          $pkg = (Get-Content package.json | ConvertFrom-Json).version
          if ($tag -ne $pkg) {
            Write-Error "Tag v$tag does not match package.json version $pkg"
            exit 1
          }

      - name: Build distributable zip
        run: npm run dist:zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Control Central ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist-electron/Control-Central-windows-x64.zip
